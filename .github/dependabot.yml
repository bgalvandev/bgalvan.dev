version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    cooldown:
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 2
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - '*'
      react-stack:
        applies-to: version-updates
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
        update-types:
          - minor
          - patch
      lint-stack:
        applies-to: version-updates
        patterns:
          - 'eslint'
          - '@typescript-eslint/*'
          - 'eslint-plugin-*'
          - '@next/eslint-plugin-next'
        update-types:
          - minor
          - patch
